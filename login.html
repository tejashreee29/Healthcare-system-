<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Healthcare</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #f1f5f9;
            background-image:
                radial-gradient(at 0% 0%, rgba(45, 206, 177, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            max-width: 480px;
            width: 90%;
            background: white;
            border-radius: var(--border-radius);
            padding: 60px;
            box-shadow: var(--shadow-premium);
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            background: var(--bg-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 30px;
            box-shadow: 0 10px 20px rgba(45, 206, 177, 0.3);
        }

        .login-card h2 {
            font-size: 2.22rem;
            margin-bottom: 12px;
            letter-spacing: -1.5px;
            color: var(--bg-dark);
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 45px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 35px 0;
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            padding: 0 20px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--bg-dark);
            font-size: 0.85rem;
        }

        .form-input {
            height: 55px;
            background: #f8fafc;
            border: 2px solid transparent;
            padding: 0 20px;
            font-size: 0.95rem;
        }

        .form-input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(45, 206, 177, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            font-size: 1.05rem;
            box-shadow: 0 10px 20px rgba(45, 206, 177, 0.2);
        }

        .signup-link {
            margin-top: 40px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .signup-link a {
            color: var(--primary);
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>

<body class="animate-fade">

    <div class="login-card">
        <div class="brand-logo">🏥</div>
        <h2>Welcome Back</h2>
        <p>Your personalized AI health dashboard is just a sign-in away. Securely access your records.</p>

        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div style="text-align: right; margin-bottom: 30px;">
                <a href="#"
                    style="color: var(--secondary); font-size: 0.85rem; font-weight: 700; text-decoration: none;">Forgot
                    password?</a>
            </div>

            <button type="submit" class="btn btn-primary login-btn">Sign In to Dashboard</button>
        </form>

        <div class="divider"><span>Or</span></div>

        <div class="signup-link">
            New to AI Health? <a href="signup.html">Create a free account</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('❌ Login failed. Make sure your server is running.');
            }
        });
    </script>

</body>

</html>
