<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Healthcare Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="animate-fade">

  <style>
    .settings-layout {
      max-width: 900px;
      margin: 0 auto;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
    }

    .profile-nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .profile-nav-link {
      padding: 15px 25px;
      border-radius: 15px;
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 700;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
    }

    .profile-nav-link:hover {
      background: rgba(0, 0, 0, 0.03);
      color: var(--bg-dark);
    }

    .profile-nav-link.active {
      background: white;
      color: var(--primary);
      box-shadow: var(--shadow-premium);
    }

    .settings-card {
      background: white;
      padding: 40px;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-premium);
      border: 1px solid rgba(0, 0, 0, 0.03);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 25px;
    }

    .avatar-upload {
      display: flex;
      align-items: center;
      gap: 25px;
      margin-bottom: 40px;
      padding-bottom: 40px;
      border-bottom: 1px solid #f1f5f9;
    }

    .avatar-large {
      width: 100px;
      height: 100px;
      background: var(--bg-gradient);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2.5rem;
      font-weight: 800;
      box-shadow: 0 10px 25px rgba(45, 206, 177, 0.3);
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--bg-dark);
      font-size: 0.9rem;
    }

    .form-input {
      height: 55px;
      background: #f8fafc;
      border: 2px solid transparent;
      padding: 0 20px;
      transition: var(--transition);
    }

    .form-input:focus {
      background: white;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(45, 206, 177, 0.1);
    }
  </style>
  </head>

  <body class="animate-fade">

    <aside class="sidebar">
      <div class="logo-container">
        <div class="logo-icon">🏥</div>
        <h2>AI Health</h2>
      </div>

      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span>📊</span> Dashboard</a></li>
        <li><a href="aichatbot.html"><span>🤖</span> AI Chatbot</a></li>
        <li><a href="appointments.html"><span>📅</span> Smart Schedule</a></li>
        <li><a href="medications.html"><span>💊</span> Medications</a></li>
        <li><a href="health-tracker.html"><span>📈</span> Health Tracker</a></li>
        <li><a href="nearby-hospitals.html"><span>🏥</span> Nearby Hospitals</a></li>
        <li><a href="medicalhistory.html"><span>📋</span> Medical History</a></li>
        <li><a href="medicalrecords.html"><span>📂</span> Medical Records</a></li>
        <li><a href="settings.html" class="active"><span>⚙️</span> Settings</a></li>
      </ul>

      <div class="logout">
        <a href="#" onclick="logout()"><span>🚪</span> Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <header style="margin-bottom: 50px;">
        <p
          style="text-transform: uppercase; font-weight: 800; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px;">
          Configuration</p>
        <h1 style="font-size: 2.8rem; letter-spacing: -1.5px;">Settings</h1>
      </header>

      <div class="settings-layout">
        <div class="settings-grid">
          <nav class="profile-nav">
            <a href="#" class="profile-nav-link active"><span>👤</span> Account Info</a>
          </nav>

          <div class="settings-card">
            <div class="avatar-upload">
              <div class="avatar-large" id="profile-avatar">U</div>
              <div>
                <h3 style="margin-bottom: 5px;">Profile Picture</h3>
                <div style="display: flex; gap: 10px;">
                  <button class="btn-primary" onclick="document.getElementById('avatar-input').click()"
                    style="padding: 10px 20px; font-size: 0.85rem; border-radius: 12px;">Change Image</button>
                  <button class="btn-outline" onclick="removeAvatar()"
                    style="padding: 10px 20px; font-size: 0.85rem; border-radius: 12px;">Remove</button>
                  <input type="file" id="avatar-input" style="display: none;" accept="image/*"
                    onchange="previewAvatar(event)">
                </div>
              </div>
            </div>

            <form id="settings-form">
              <div class="form-row">
                <div class="form-group">
                  <label>Username</label>
                  <input type="text" class="form-input" id="setting-username" placeholder="Enter username">
                </div>
                <div class="form-group">
                  <label>Email Address</label>
                  <input type="email" class="form-input" id="setting-email" placeholder="Enter email">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>Phone Number</label>
                  <input type="tel" class="form-input" placeholder="+1 (555) 000-0000">
                </div>
                <div class="form-group">
                  <label>Birth Date</label>
                  <input type="date" class="form-input">
                </div>
              </div>

              <div class="form-group" style="margin-bottom: 25px;">
                <label>Location / Address</label>
                <input type="text" class="form-input" placeholder="City, Country">
              </div>

              <div
                style="padding-top: 30px; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; gap: 15px;">
                <button type="button" class="btn-outline" style="padding: 15px 30px;">Cancel</button>
                <button type="submit" class="btn-primary"
                  style="padding: 15px 40px; box-shadow: 0 10px 20px rgba(45, 206, 177, 0.2);">Save Changes ✨</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script>
      // Init form with local data
      const email = localStorage.getItem('userEmail');
      if (email) {
        document.getElementById('setting-email').value = email;
        const user = email.split('@')[0];
        document.getElementById('setting-username').value = user;
        document.getElementById('profile-avatar').innerText = user[0].toUpperCase();
      }

      if (!localStorage.getItem('isLoggedIn')) {
        window.location.href = 'login.html';
      }

      function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
      }

      document.getElementById('settings-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.innerText = '✅ Saved!';
        setTimeout(() => btn.innerText = 'Save Changes ✨', 2000);
      });

      function previewAvatar(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const avatar = document.getElementById('profile-avatar');
          avatar.innerHTML = `<img src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">`;
          localStorage.setItem('userAvatar', e.target.result);
        };
        reader.readAsDataURL(file);
      }

      function removeAvatar() {
        const email = localStorage.getItem('userEmail');
        const avatar = document.getElementById('profile-avatar');
        avatar.innerHTML = email ? email[0].toUpperCase() : 'U';
        localStorage.removeItem('userAvatar');
        document.getElementById('avatar-input').value = ''; // Clear the file input
      }

      // Load saved avatar on page load
      const savedAvatar = localStorage.getItem('userAvatar');
      if (savedAvatar) {
        document.getElementById('profile-avatar').innerHTML = `<img src="${savedAvatar}" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">`;
      }
    </script>
  </body>

</html>

</html>
