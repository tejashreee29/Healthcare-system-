<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join AI Healthcare - Create Account</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #f1f5f9;
            background-image:
                radial-gradient(at 0% 0%, rgba(45, 206, 177, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 60px 0;
        }

        .signup-card {
            max-width: 550px;
            width: 90%;
            background: white;
            border-radius: var(--border-radius);
            padding: 60px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            background: var(--bg-gradient);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(45, 206, 177, 0.2);
        }

        .signup-card h2 {
            font-size: 2.2rem;
            margin-bottom: 12px;
            letter-spacing: -1.5px;
            color: var(--bg-dark);
        }

        .signup-card p {
            color: var(--text-muted);
            margin-bottom: 45px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--bg-dark);
            font-size: 0.85rem;
        }

        .form-input {
            height: 55px;
            background: #f8fafc;
            border: 2px solid transparent;
            padding: 0 20px;
            font-size: 0.95rem;
        }

        .form-input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(45, 206, 177, 0.1);
        }

        .signup-btn {
            width: 100%;
            padding: 18px;
            margin-top: 30px;
            font-size: 1.05rem;
            box-shadow: 0 10px 20px rgba(45, 206, 177, 0.2);
        }

        .login-link {
            margin-top: 40px;
            font-size: 0.95rem;
            text-align: center;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--primary);
            font-weight: 800;
            text-decoration: none;
        }

        @media (max-width: 500px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full {
                grid-column: span 1;
            }

            .signup-card {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body class="animate-fade">

    <div class="signup-card">
        <div class="brand-logo">🏥</div>
        <h2>Create Your Health ID</h2>
        <p>Join thousands of users using AI to manage their wellness journey. It only takes a minute.</p>

        <form id="signup-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" class="form-input" placeholder="Enter Full Name" required>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" class="form-input" placeholder="Years" required>
                </div>

                <div class="form-group full">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                </div>

                <div class="form-group full">
                    <label>Create Secure Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender" class="form-input" required>
                        <option value="">Select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Phone (Optional)</label>
                    <input type="tel" id="phone" class="form-input" placeholder="+1 (555) 000-0000">
                </div>
            </div>

            <p
                style="text-align: left; font-size: 0.85rem; margin-top: 25px; color: var(--text-muted); line-height: 1.5;">
                By signing up, you agree to our <a href="#" style="color: var(--secondary); font-weight: 600;">Terms</a>
                and <a href="#" style="color: var(--secondary); font-weight: 600;">Privacy Policy</a>.
            </p>

            <button type="submit" class="btn btn-primary signup-btn">Complete Registration ✨</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const mobile = document.getElementById('phone').value;

            try {
                const response = await fetch('http://localhost:3000/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, age, gender, mobile })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ Registration successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                console.error('Signup error:', error);
                alert('❌ Registration failed. Please try again.');
            }
        });
    </script>

</body>

</html>
